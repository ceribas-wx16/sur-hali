<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sur Halı | Halı Koleksiyonu</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#f5f5f5;
}

header{
background:#0d3b66;
color:white;
padding:25px;
text-align:center;
}

header h1{
margin:0;
font-size:34px;
}

header p{
margin-top:10px;
}

.container{
width:90%;
max-width:1300px;
margin:auto;
padding:40px 0;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,.12);
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
height:320px;
object-fit:cover;
display:block;
}

.card h3{
text-align:center;
padding:18px;
margin:0;
}

.back{
text-align:center;
margin:50px 0;
}

.back a{
background:#0d3b66;
color:white;
padding:14px 35px;
text-decoration:none;
border-radius:8px;
}

.back a:hover{
background:#14538f;
}

</style>

</head>

<body>

<header>

<h1>Halı Koleksiyonumuz</h1>

<p>Sur Halı İznik</p>

</header>

<div class="container">

<div class="gallery">

<div class="card">

<img src="https://ceribas-wx16.github.io/sur-hali/resimler/halilar/3c678b8b-af21-4dc8-b138-42a12e5909e6.jpg" alt="Sur Halı İznik halı modeli">

</div>

<h3>Halı Modeli</h3>

</div>


<div class="card">

<img src="https://ceribas-wx16.github.io/sur-hali/resimler/halilar/3c678b8b-af21-4dc8-b138-42a12e5909e6.jpg" alt="Sur Halı İznik halı modeli">
<h3>Halı Modeli</h3>

</div>

</div>

</div>

</div>

</body>

</html>
